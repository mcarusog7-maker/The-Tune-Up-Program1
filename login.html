<script>
  const SUPABASE_URL = 'https://qvovlnxonotbxcsnyejs.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_A2DkeOYyRZwHw8hwUOZlMw_W2_XDClG';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si ya está logueado, redirigir
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      redirectByRole(data.session.user);
    }
  });

  async function redirectByRole(user) {
    const { data: profile, error } = await sb
      .from('profiles')
      .select('role')
      .eq('id', user.id)
      .maybeSingle();

    if (error || !profile) {
      // No se pudo leer el perfil — mostrar error en lugar de bucle
      const msg = document.getElementById('msg');
      msg.className = 'msg error';
      msg.textContent = 'Error al cargar tu perfil. Contacta con Marc.';
      await sb.auth.signOut();
      return;
    }

    if (profile.role === 'admin') {
      window.location.href = '/admin.html';
    } else {
      window.location.href = '/dashboard.html';
    }
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const msg = document.getElementById('msg');

    msg.className = 'msg';
    msg.textContent = '';

    if (!email || !password) {
      msg.className = 'msg error';
      msg.textContent = 'Introduce tu email y contraseña.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = 'Email o contraseña incorrectos.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    await redirectByRole(data.user);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>

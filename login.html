<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — The Tune-Up Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F0E8; --cream-dark: #EDE7D9; --ink: #1A1714; --ink-soft: #3D3830;
    --rust: #C4440A; --rust-light: #F5E8E0; --sand: #D4C9B0; --white: #FDFCFA;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body { background: var(--cream); color: var(--ink); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; }

  nav { padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212,201,176,0.4); }
  .nav-logo { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; text-decoration: none; }
  .nav-logo span { color: var(--rust); }

  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }

  .login-box { width: 100%; max-width: 440px; }
  .login-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rust); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .login-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--rust); }
  .login-title { font-family: var(--font-display); font-size: 36px; font-weight: 300; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 8px; }
  .login-title em { font-style: italic; color: var(--rust); }
  .login-sub { font-size: 15px; color: var(--ink-soft); font-weight: 300; margin-bottom: 40px; line-height: 1.6; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 14px 16px; background: var(--white); border: 1px solid var(--sand);
    font-family: var(--font-body); font-size: 15px; color: var(--ink); outline: none;
    transition: border-color .2s; border-radius: 2px;
  }
  input:focus { border-color: var(--rust); }

  .btn-login {
    width: 100%; padding: 16px; background: var(--rust); color: var(--white);
    border: none; font-family: var(--font-body); font-size: 13px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: background .2s; border-radius: 2px; margin-top: 8px;
  }
  .btn-login:hover { background: #A03508; }
  .btn-login:disabled { background: var(--sand); cursor: not-allowed; }

  .msg { margin-top: 16px; font-size: 14px; padding: 12px 16px; border-radius: 2px; display: none; }
  .msg.error { background: #FEE8E0; color: #8B2500; display: block; }
  .msg.success { background: #E1F5EE; color: #0D5C3A; display: block; }

  .login-note { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--sand); font-size: 13px; color: var(--ink-soft); text-align: center; line-height: 1.6; }

  footer { padding: 24px 48px; border-top: 1px solid rgba(212,201,176,0.4); text-align: center; font-size: 12px; color: var(--sand); }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Tune<span>-Up</span></a>
</nav>

<main>
  <div class="login-box">
    <div class="login-eyebrow">Área privada</div>
    <h1 class="login-title">Tu taller,<br><em>tu espacio.</em></h1>
    <p class="login-sub">Accede con el email que usaste al registrarte en el programa.</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">Entrar</button>

    <div class="msg" id="msg"></div>

    <p class="login-note">¿Primera vez que accedes? Recibirás un email de Marc con tus credenciales cuando empiece el programa.</p>
  </div>
</main>

<footer>© 2025 The Tune-Up Program</footer>

<script>
  const SUPABASE_URL = 'https://qvovlnxonotbxcsnyejs.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_A2DkeOYyRZwHw8hwUOZlMw_W2_XDClG';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si ya está logueado, redirigir
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      redirectByRole(data.session.user);
    }
  });

  async function redirectByRole(user) {
    const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();
    if (profile?.role === 'admin') {
      window.location.href = '/admin.html';
    } else {
      window.location.href = '/dashboard.html';
    }
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const msg = document.getElementById('msg');

    msg.className = 'msg';
    msg.textContent = '';

    if (!email || !password) {
      msg.className = 'msg error';
      msg.textContent = 'Introduce tu email y contraseña.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      msg.className = 'msg error';
      msg.textContent = 'Email o contraseña incorrectos. Si es tu primer acceso, revisa el email de Marc.';
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    await redirectByRole(data.user);
  }

  // Enter para hacer login
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
